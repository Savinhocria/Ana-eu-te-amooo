<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Uma pergunta pra você ❤️</title>

<style>

body{
margin:0;
font-family: Arial;
background: linear-gradient(135deg,#ff9a9e,#fad0c4);
text-align:center;
overflow:hidden;
}

.container{
margin-top:60px;
}

img{
width:300px;
border-radius:20px;
box-shadow:0 0 20px rgba(0,0,0,0.4);
}

h1{
color:white;
font-size:40px;
margin-top:20px;
}

p{
color:white;
font-size:20px;
width:70%;
margin:auto;
}

button{
padding:15px 30px;
font-size:20px;
border:none;
border-radius:30px;
margin:20px;
cursor:pointer;
}

#sim{
background:#ff4d6d;
color:white;
}

#nao{
background:white;
}

.heart{
position:absolute;
color:red;
animation:fall 5s linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10vh);}
100%{transform:translateY(110vh);}
}

.explosion{
position:absolute;
font-size:30px;
animation:explode 1s forwards;
}

@keyframes explode{
0%{
transform:scale(1);
opacity:1;
}
100%{
transform:scale(4);
opacity:0;
}
}

</style>
</head>

<body>

<!-- Música -->
<iframe width="0" height="0"
src="https://www.youtube.com/embed/4a1z7sZs6NQ?autoplay=1&loop=1&playlist=4a1z7sZs6NQ"
allow="autoplay">
</iframe>

<div class="container">

<img src="ana.jpg">

<h1>Ana Theodoro ❤️</h1>

<p>
Desde que comecei a conversar com você,
percebi que você é uma pessoa muito especial.
Mesmo à distância você conseguiu
deixar meus dias melhores.
</p>

<p>
Seu jeito, sua beleza e a forma
como você me faz sentir bem
me fizeram perceber uma coisa.
</p>

<h2 style="color:white;">Ana, você aceita namorar comigo? 💍</h2>

<button id="sim" onclick="aceitou()">SIM ❤️</button>
<button id="nao" onmouseover="fugir()">NÃO</button>

</div>

<script>

function aceitou(){

for(let i=0;i<50;i++){

let heart=document.createElement("div");
heart.className="explosion";
heart.innerHTML="❤️";

heart.style.left=Math.random()*100+"%";
heart.style.top=Math.random()*100+"%";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},1000);

}

setTimeout(()=>{

document.body.innerHTML=`
<h1 style="margin-top:200px;color:white;font-size:50px;">
❤️ Agora é oficial ❤️
</h1>

<p style="font-size:25px;color:white;">
A partir de hoje você é oficialmente minha namorada.<br><br>

Prometo cuidar de você,
te respeitar,
te dar carinho
e fazer de tudo para ver você feliz.<br><br>

Que esse seja apenas o começo
da nossa história. ❤️
</p>
`;

},900)

}

function fugir(){
let btn=document.getElementById("nao");
btn.style.position="absolute";
btn.style.left=Math.random()*80+"%";
btn.style.top=Math.random()*80+"%";
}

setInterval(()=>{
let heart=document.createElement("div");
heart.className="heart";
heart.innerHTML="❤️";
heart.style.left=Math.random()*100+"%";
heart.style.fontSize=(Math.random()*20+10)+"px";

document.body.appendChild(heart);

setTimeout(()=>{heart.remove();},5000);

},300);

</script>

</body>
</html>
